<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta charset="utf-8" />
    <title>{{ title }}</title>
    <link rel="stylesheet" type="text/css" media="screen" href="../resources/css/bootstrap-2.3.2.min.css" />
    <link rel="stylesheet" type="text/css" media="screen" href="../resources/css/bootstrap-responsive-2.3.2.min.css" />
    <script type="text/javascript" src="../resources/js/jquery-1.10.2.js"></script>
</head>
<body>
    <div class="container-fluid">
        <div class="masthead">
            <h1>SDSS</h1>
            <h2>{{ title }}</h2>
        </div>
        <div class="row-fluid">
            <div class="span12">
                <table class="table table-striped table-condensed">
                    <caption>MJD Reverify Status</caption>
                    <thead>
                        <tr><th>MJD</th>{% for section in sections %}<th>{{ section | upper }}</th>{% endfor %}</tr>
                    </thead>
                    <tbody>
                        {% for mjd, history in histories.items() -%}{% set history = histories[mjd] if mjd in histories else None %}
                        {% if history %}<tr>
                            <td><a href='./{{ history.mjd }}/{{ history.current_index }}>{{ mjd }}</a></td>{% for section, info in history.items() -%}{% set status = info.current_status %}{% set modified = info.modified  %}
                            <td class="{{ color }}">{% if status %}{{ status | upper }} as of {{ modified }} {% else %}--{% endif %}</td>
                            {%- endfor %}
                        </tr>{% endif %}
                        {%- endfor %}
                    </tbody>
                </table>
            </div>
        </div>
        <footer class="footer hidden-tablet hidden-phone">
            <p class="muted">Modified: {{ modified.strftime('%Y-%m-%d %H:%M') }} UTC.</p>
        </footer>
    </div>
</body>
</html>
